      const allExs = getExercisesForCategory(cat, pid);
      // Determine type of each exercise for this context
      const globalDeleted = state.customExercises['__deleted__'] || [];
      const playerDeleted = pid ? ((state.playerExercises[pid] || {})['__deleted__'] || []) : [];
      const playerCustom = pid ? ((state.playerExercises[pid] || {})[cat] || []) : [];
      const globalCustom = state.customExercises[cat] || [];

      const items = allExs.map(e => {
        let type = 'base';
        if (playerCustom.includes(e)) type = 'player';
        else if (globalCustom.includes(e)) type = 'global';
        return { name: e, type };
      });

      return `
        <div class="card" style="margin-bottom:1rem">
          <div class="card-title" style="margin-bottom:10px">
            <span style="color:${(CATEGORY_COLORS[cat]||{}).color||'var(--text)'}">${cat}</span>
            <span style="font-size:12px;color:var(--text3);font-weight:400">${items.length}種目</span>
          </div>
          <div style="display:flex;flex-direction:column;gap:4px">
            ${items.map(ex => `
              <div style="display:flex;align-items:center;gap:8px;padding:6px 10px;background:var(--surface2);border-radius:var(--radius)">
                <span style="font-size:13px;flex:1">${ex.name}</span>
                ${ex.type==='player' ? '<span class="badge badge-green" style="font-size:10px">個人</span>'
                  : ex.type==='global' ? '<span class="badge badge-blue" style="font-size:10px">共通追加</span>' : ''}
                <button class="btn btn-danger btn-xs" onclick="deleteExercise('${cat}','${ex.name}','${ex.type}')">削除</button>
              </div>`).join('')}
          </div>
          <button class="btn btn-ghost btn-sm" style="margin-top:10px;width:100%;justify-content:center" onclick="addExerciseManually('${cat}')">＋ 種目を追加</button>
        </div>`;
    }).join('')}
  `);
}

function deleteExercise(cat, name, type) {
  if (!confirm(`「${name}」を削除しますか？`)) return;
  const pid = exMgrPlayerId;
  if (type === 'player' && pid) {
    state.playerExercises[pid][cat] = (state.playerExercises[pid][cat] || []).filter(e => e !== name);
    saveData('playerExercises', state.playerExercises);
  } else if (type === 'global') {
    state.customExercises[cat] = (state.customExercises[cat] || []).filter(e => e !== name);
    saveData('customExercises', state.customExercises);
  } else {
    // Hide base exercise
    const store = pid ? 'playerExercises' : 'customExercises';
    if (pid) {
      if (!state.playerExercises[pid]) state.playerExercises[pid] = {};
      if (!state.playerExercises[pid]['__deleted__']) state.playerExercises[pid]['__deleted__'] = [];
      if (!state.playerExercises[pid]['__deleted__'].includes(cat + ':' + name))
        state.playerExercises[pid]['__deleted__'].push(cat + ':' + name);
      saveData('playerExercises', state.playerExercises);
    } else {
      if (!state.customExercises['__deleted__']) state.customExercises['__deleted__'] = [];
      if (!state.customExercises['__deleted__'].includes(cat + ':' + name))
        state.customExercises['__deleted__'].push(cat + ':' + name);
      saveData('customExercises', state.customExercises);
    }
  }
  showToast(`「${name}」を削除しました`, '🗑️');
  renderExerciseMgr();
}

function addExerciseManually(cat) {
  const pid = exMgrPlayerId;
  const label = pid ? `${playerName(pid)} の ${cat}` : cat;
  const name = prompt(label + ' の種目名を入力してください:');
  if (!name || !name.trim()) return;
  const trimmed = name.trim();
  if (pid) {
    if (!state.playerExercises[pid]) state.playerExercises[pid] = {};
    if (!state.playerExercises[pid][cat]) state.playerExercises[pid][cat] = [];
    if (!state.playerExercises[pid][cat].includes(trimmed)) {
      state.playerExercises[pid][cat].push(trimmed);
      saveData('playerExercises', state.playerExercises);
      showToast(`「${trimmed}」を${playerName(pid)}に追加しました`);
    }
  } else {
    if (!state.customExercises[cat]) state.customExercises[cat] = [];
    if (!state.customExercises[cat].includes(trimmed)) {
      state.customExercises[cat].push(trimmed);
      saveData('customExercises', state.customExercises);
      showToast(`「${trimmed}」を追加しました`);
    }
  }
  renderExerciseMgr();
}

const SYMPTOM_ITEMS = ['頭痛', '吐き気', '腹痛', '喉の痛み', '発熱'];

// ナビゲーション: [parentEventId | null, currentEventId | null]
// null,null = トップ一覧
// parentId,null = 親フォルダ内のサブフォルダ一覧
// *,eventId = そのイベントの選手一覧
let condNavStack = []; // [{id, name}]の履歴スタック

function renderCondCheckPanel() {
  if (condNavStack.length === 0) return renderCondEventList(null);
  const current = condNavStack[condNavStack.length - 1];
  if (current.type === 'folder') return renderCondEventList(current.id);
  return renderCondEventDetail(current.id);
}

function condNavPush(item) { condNavStack.push(item); renderCondition(); }
function condNavBack() { condNavStack.pop(); renderCondition(); }
function condNavReset() { condNavStack = []; renderCondition(); }

function typeColor(type) {
  return type==='試合'?'var(--red)':type==='合宿'?'var(--purple)':type==='練習'?'var(--accent)':type==='フォルダ'?'var(--yellow)':'var(--text2)';
}

// ---- フォルダ/イベント一覧 ----
function renderCondEventList(parentId) {
  const parentIdStr = parentId || null;
  const items = [...(state.condEvents||[])]
    .filter(e => (e.parentId||null) === parentIdStr)
    .sort((a,b) => b.date.localeCompare(a.date));

  const breadcrumb = condNavStack.length > 0
    ? `<div style="display:flex;align-items:center;gap:6px;margin-bottom:1rem;flex-wrap:wrap">
        <button class="btn btn-ghost btn-sm" onclick="condNavBack()">← 戻る</button>
        ${condNavStack.map((s,i) => `<span style="font-size:12px;color:var(--text3)">${i>0?'›':''} ${s.name}</span>`).join('')}
      </div>` : '';

  return `
    ${breadcrumb}
    <div style="display:flex;gap:6px;justify-content:flex-end;margin-bottom:1rem">
      <button class="btn btn-ghost btn-sm" data-pid="${parentIdStr||''}" onclick="openCondEventForm('folder',this.dataset.pid||null)">📁 フォルダ作成</button>
      <button class="btn btn-primary btn-sm" data-pid="${parentIdStr||''}" onclick="openCondEventForm('event',this.dataset.pid||null)">＋ イベント作成</button>
    </div>
    ${items.length === 0
      ? `<div class="empty"><div class="empty-icon">📋</div><div class="empty-text">まだ何もありません</div></div>`
      : items.map(ev => {
          const isFolder = ev.type === 'フォルダ';
          const checks = isFolder ? [] : (state.conditionChecks||[]).filter(c => c.eventId === ev.id);
          const checkedCount = new Set(checks.map(c => c.playerId)).size;
          const childCount = isFolder ? (state.condEvents||[]).filter(e => e.parentId === ev.id).length : 0;
          const color = typeColor(ev.type);
          return `
            <div class="card" style="margin-bottom:.75rem;cursor:pointer;border-left:3px solid ${color}"
              data-evid="${ev.id}" data-evname="${ev.name.replace(/"/g,'&quot;')}" data-evtype="${isFolder?'folder':'detail'}"
              onclick="condNavPush({id:this.dataset.evid,name:this.dataset.evname,type:this.dataset.evtype})"
            >
              <div style="display:flex;align-items:center;justify-content:space-between">
                <div style="flex:1;min-width:0">
                  <div style="display:flex;align-items:center;gap:6px;margin-bottom:3px">
                    <span style="font-size:16px">${isFolder?'📁':'📋'}</span>
                    <span style="font-size:12px;font-weight:600;padding:2px 8px;border-radius:12px;background:${color}22;color:${color}">${ev.type}</span>
                    <span style="font-size:15px;font-weight:700">${ev.name}</span>
                  </div>
                  <div style="font-size:12px;color:var(--text3)">${formatDate(ev.date)} ${isFolder ? `— ${childCount}項目` : `— ${checkedCount}/${state.players.length}名 記録済み`}</div>
                </div>
                <div style="display:flex;align-items:center;gap:6px">
                  ${!isFolder ? `<div style="text-align:right"><div style="font-size:14px;font-weight:700;color:${checkedCount===state.players.length?'var(--green)':'var(--text2)'}">${state.players.length?Math.round(checkedCount/state.players.length*100):0}%</div></div>` : ''}
                  <span style="font-size:20px;color:var(--text3)">›</span>
                </div>
              </div>
            </div>`;
        }).join('')
    }`;
}

function openCondEventForm(createType, parentId) {
  const isFolder = createType === 'folder';
  openModal(isFolder ? 'フォルダを作成' : 'イベントを作成', `
    <div class="form-group"><label class="form-label">${isFolder?'フォルダ名':'イベント名'} *</label>
      <input class="form-input" id="cev-name" placeholder="${isFolder?'例: 春季リーグ、夏合宿':'例: 試合前、試合後、1日目'}" />
    </div>
    <div class="form-row form-row-2">
      <div class="form-group"><label class="form-label">日付</label>
        <input class="form-input" type="date" id="cev-date" value="${today()}" />
      </div>
      ${!isFolder ? `<div class="form-group"><label class="form-label">種類</label>
        <select class="form-select" id="cev-type">
          <option>練習</option><option>試合</option><option>合宿</option><option>その他</option>
        </select>
      </div>` : ''}
    </div>
    <div class="form-group"><label class="form-label">メモ</label>
      <input class="form-input" id="cev-memo" placeholder="補足情報..." />
    </div>
  `, `<button class="btn btn-ghost" onclick="closeModal()">キャンセル</button>
     <button class="btn btn-primary" id="cev-save-btn" data-type="${createType}" data-pid="${parentId||''}" onclick="saveCondEvent(this.dataset.type,this.dataset.pid||null)">作成</button>`);
}

function saveCondEvent(createType, parentId) {
  const name = document.getElementById('cev-name').value.trim();
  if (!name) { alert('名前を入力してください'); return; }
  const isFolder = createType === 'folder';
  const typeEl = document.getElementById('cev-type');
  const ev = {
    id: 'cev-' + Date.now(),
    name,
    date: document.getElementById('cev-date').value,
    type: isFolder ? 'フォルダ' : (typeEl ? typeEl.value : 'その他'),
    parentId: parentId || null,
    memo: document.getElementById('cev-memo').value,
    createdAt: new Date().toISOString(),
  };
  if (!Array.isArray(state.condEvents)) state.condEvents = [];
  state.condEvents.push(ev);
  saveData('condEvents', state.condEvents);
  closeModal();
  showToast(`「${name}」を作成しました`);
  if (!isFolder) condNavPush({id: ev.id, name: ev.name, type: 'detail'});
  else renderCondition();
}

// ---- イベント詳細（選手一覧） ----
function renderCondEventDetail(eventId) {
  const ev = (state.condEvents||[]).find(e => e.id === eventId);
  if (!ev) { condNavBack(); return renderCondCheckPanel(); }
  if (!Array.isArray(state.conditionChecks)) state.conditionChecks = [];
  const checks = state.conditionChecks.filter(c => c.eventId === eventId);
  const checkedCount = new Set(checks.map(c => c.playerId)).size;
  const color = typeColor(ev.type);

  const breadcrumb = `<div style="display:flex;align-items:center;gap:6px;margin-bottom:1rem;flex-wrap:wrap">
    <button class="btn btn-ghost btn-sm" onclick="condNavBack()">← 戻る</button>
    ${condNavStack.map(s => `<span style="font-size:12px;color:var(--text3)">› ${s.name}</span>`).join('')}
    <button class="btn btn-danger btn-xs" style="margin-left:auto" onclick="deleteCondEvent('${ev.id}')">削除</button>
  </div>`;

  return `${breadcrumb}
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:1rem">
      <span style="font-size:12px;padding:2px 8px;border-radius:12px;background:${color}22;color:${color};font-weight:600">${ev.type}</span>
      <span style="font-size:16px;font-weight:700">${ev.name}</span>
      <span style="font-size:12px;color:var(--text3)">${formatDate(ev.date)}</span>
      <span style="font-size:13px;color:var(--text2);margin-left:auto">${checkedCount}/${state.players.length}名</span>
    </div>
    ${state.players.map(p => {
      const check = checks.find(c => c.playerId === p.id);
      const symptoms = check ? (check.symptoms || []) : [];
      const hasInjury = check && check.injuryNote;
      return `
        <div class="card" style="margin-bottom:.5rem">
          <div style="display:flex;align-items:center;gap:8px">
            <div class="player-avatar" style="background:${avatarColor(parseInt((p.id||'p0').slice(1)))}; width:28px;height:28px;font-size:10px">${initials(p.name)}</div>
            <div style="flex:1;min-width:0">
              <div style="font-size:13px;font-weight:600">${p.name}</div>
              ${check ? `<div style="display:flex;gap:4px;flex-wrap:wrap;margin-top:3px">
                ${symptoms.length > 0 ? symptoms.map(s => `<span style="font-size:10px;padding:1px 6px;border-radius:10px;background:rgba(248,113,113,0.15);color:#f87171;border:1px solid rgba(248,113,113,0.3)">${s}</span>`).join('') : '<span style="font-size:11px;color:var(--green)">症状なし</span>'}
                ${check.otherSymptom ? `<span style="font-size:10px;padding:1px 6px;border-radius:10px;background:rgba(251,146,60,0.15);color:var(--orange)">${check.otherSymptom}</span>` : ''}
                ${hasInjury ? `<span style="font-size:10px;padding:1px 6px;border-radius:10px;background:rgba(167,139,250,0.15);color:var(--purple)">🤕 怪我あり</span>` : ''}
              </div>` : ''}
            </div>
            ${check
              ? `<button class="btn btn-ghost btn-xs" onclick="openCondCheckForm('${p.id}','${eventId}')">編集</button>`
              : `<button class="btn btn-green btn-xs" onclick="openCondCheckForm('${p.id}','${eventId}')">入力</button>`}
          </div>
          ${check && (check.memo || check.injuryNote) ? `
            <div style="font-size:11px;color:var(--text3);margin-top:4px;padding-left:36px">
              ${check.memo ? `メモ：${check.memo}` : ''}
              ${check.injuryNote ? `<br>🤕 怪我：${check.injuryNote}` : ''}
            </div>` : ''}
        </div>`;
    }).join('')}`;
}

function deleteCondEvent(id) {
  if (!confirm('削除しますか？関連する記録もすべて削除されます。')) return;
  // 子イベントも再帰削除
  const toDelete = new Set();
  const collect = (pid) => {
    toDelete.add(pid);
    (state.condEvents||[]).filter(e => e.parentId === pid).forEach(e => collect(e.id));
  };
  collect(id);
  state.condEvents = (state.condEvents||[]).filter(e => !toDelete.has(e.id));
  state.conditionChecks = (state.conditionChecks||[]).filter(c => !toDelete.has(c.eventId));
  saveData('condEvents', state.condEvents);
  saveData('conditionChecks', state.conditionChecks);
  condNavBack();
  showToast('削除しました', '🗑️');
  renderCondition();
}

// ---- 状態チェック入力フォーム ----
function openCondCheckForm(presetPlayerId, eventId) {
  const ev = eventId ? (state.condEvents||[]).find(e => e.id === eventId) : null;
  if (!Array.isArray(state.conditionChecks)) state.conditionChecks = [];
  const existing = presetPlayerId && eventId
    ? state.conditionChecks.find(c => c.playerId === presetPlayerId && c.eventId === eventId)
    : null;
  const exSymptoms = existing ? (existing.symptoms || []) : [];

  openModal(`状態チェック${ev ? ' — ' + ev.name : ''}`, `
    <div class="form-group" style="margin-bottom:1rem"><label class="form-label">選手 *</label>
      <select class="form-select" id="cond-player">
        <option value="">選択...</option>
        ${state.players.map(p=>`<option value="${p.id}" ${presetPlayerId===p.id?'selected':''}>${p.name}</option>`).join('')}
      </select>
    </div>

    <div style="font-size:13px;font-weight:600;margin-bottom:8px">📋 体調チェック（該当するものをタップ）</div>
    <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:1rem">
      ${SYMPTOM_ITEMS.map(s => {
        const on = exSymptoms.includes(s);
        return `<div class="symptom-chip" data-sym="${s}" data-on="${on?'1':'0'}" onclick="toggleSymptom(this)"
          style="padding:6px 12px;border-radius:20px;font-size:13px;font-weight:500;cursor:pointer;transition:all 0.15s;border:2px solid ${on?'#f87171':'var(--border2)'};color:${on?'#f87171':'var(--text2)'};background:${on?'rgba(248,113,113,0.15)':'transparent'}">
          ${s}
        </div>`;
      }).join('')}
    </div>
    <div class="form-group" style="margin-bottom:1rem">
      <label class="form-label">その他の症状</label>
      <input class="form-input" id="cond-other-symptom" placeholder="自由記入..." value="${existing&&existing.otherSymptom?existing.otherSymptom:''}" />
    </div>

    <div style="font-size:13px;font-weight:600;margin-bottom:8px">🤕 怪我</div>
    <div class="form-group">
      <input class="form-input" id="cond-inj-note" placeholder="怪我がある場合は自由記入（例：左膝打撲）" value="${existing&&existing.injuryNote?existing.injuryNote:''}" />
    </div>

    <div class="form-group"><label class="form-label">その他メモ</label>
      <input class="form-input" id="cond-memo" placeholder="自由記入..." value="${existing?existing.memo||'':''}" />
    </div>
  `, `<button class="btn btn-ghost" onclick="closeModal()">キャンセル</button>
      <button class="btn btn-primary" onclick="saveCondCheck('${eventId||''}')">保存</button>`);
}

function toggleSymptom(el) {
  const active = el.dataset.on === '1';
  el.dataset.on = active ? '0' : '1';
  el.style.borderColor = active ? 'var(--border2)' : '#f87171';
  el.style.color = active ? 'var(--text2)' : '#f87171';
  el.style.background = active ? 'transparent' : 'rgba(248,113,113,0.15)';
}

function toggleInjuryFields() {}

function selectCondLevel(el) {
  // kept for compat
}

function saveCondCheck(eventId) {
  const playerId = document.getElementById('cond-player').value;
  if (!playerId) { alert('選手を選択してください'); return; }
  const ev = eventId ? (state.condEvents||[]).find(e => e.id === eventId) : null;
  const date = ev ? ev.date : today();

  const symptoms = [...document.querySelectorAll('.symptom-chip[data-on="1"]')].map(c => c.dataset.sym);
  const otherSymptom = document.getElementById('cond-other-symptom') ? document.getElementById('cond-other-symptom').value.trim() : '';
  const injuryNote = document.getElementById('cond-inj-note') ? document.getElementById('cond-inj-note').value.trim() : '';
  const injuryPart = null;
  const injuryType = null;

  if (!Array.isArray(state.conditionChecks)) state.conditionChecks = [];
  const idx = state.conditionChecks.findIndex(c =>
    c.playerId === playerId && (eventId ? c.eventId === eventId : c.date === date)
  );
  const rec = {
    id: 'cond-' + playerId + '-' + (eventId || date),
    playerId, date,
    eventId: eventId || null,
    symptoms, otherSymptom,
    injuryPart, injuryType, injuryNote,
    memo: document.getElementById('cond-memo') ? document.getElementById('cond-memo').value : '',
    createdAt: new Date().toISOString(),
  };
  if (idx >= 0) state.conditionChecks[idx] = rec;
  else state.conditionChecks.push(rec);
  saveData('conditionChecks', state.conditionChecks);
  closeModal();
  showToast('状態を記録しました');
  renderCondition();
}

// ========== START ==========
init();
</script>
</body>
